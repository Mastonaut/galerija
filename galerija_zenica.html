<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; font-family: sans-serif; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }

  .grid img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    cursor: pointer;
    display: block;
    transition: opacity .2s;
  }
  .grid img:hover { opacity: .78; }

  /* Wrapper koji drži i grid i lightbox */
  #wrapper {
    position: relative;
  }

  #lb {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,.93);
    z-index: 9999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #lb.on { display: flex; }

  #lb-img {
    max-width: 92%;
    max-height: 240px;
    object-fit: contain;
    display: block;
  }

  #lb-x {
    position: absolute;
    top: 10px;
    right: 16px;
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    line-height: 1;
    opacity: .9;
  }
  #lb-x:hover { opacity: 1; }

  #lb-nav {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 12px;
  }

  #lb-nav span {
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    opacity: .75;
    user-select: none;
    line-height: 1;
    padding: 4px 10px;
  }
  #lb-nav span:hover { opacity: 1; }

  #lb-cnt {
    color: #fff;
    font-size: 13px;
    opacity: .6;
    min-width: 40px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div class="grid" id="grid"></div>

  <div id="lb">
    <span id="lb-x">&#x2715;</span>
    <img id="lb-img" src="" alt="">
    <div id="lb-nav">
      <span id="lb-prev">&#10094;</span>
      <span id="lb-cnt">1 / 6</span>
      <span id="lb-next">&#10095;</span>
    </div>
  </div>
</div>

<script>
  var base = "https://asacentral.ba/media/Poslovnica_Zenica_jun_2026/";
  var slike = [
    "DSC_5611_web.webp",
    "DSC_5593_web.webp",
    "DSC_5707_web.webp",
    "DSC_5641_web.webp",
    "DSC_5670_web.webp",
    "DSC_5727.webp"
  ];

  var cur = 0;
  var lb    = document.getElementById("lb");
  var lbImg = document.getElementById("lb-img");
  var lbCnt = document.getElementById("lb-cnt");
  var grid  = document.getElementById("grid");

  // Gradi thumbnailove
  slike.forEach(function(s, i) {
    var img = document.createElement("img");
    img.src = base + s;
    img.alt = "Poslovnica Zenica " + (i+1);
    img.addEventListener("click", function() { lbOpen(i); });
    grid.appendChild(img);
  });

  function lbOpen(i) {
    cur = i;
    lbImg.src = base + slike[cur];
    lbCnt.textContent = (cur+1) + " / " + slike.length;
    lb.className = "on";
  }

  function lbClose() {
    lb.className = "";
  }

  function lbNav(dir) {
    cur = (cur + dir + slike.length) % slike.length;
    lbImg.src = base + slike[cur];
    lbCnt.textContent = (cur+1) + " / " + slike.length;
  }

  document.getElementById("lb-x").addEventListener("click", lbClose);
  document.getElementById("lb-prev").addEventListener("click", function() { lbNav(-1); });
  document.getElementById("lb-next").addEventListener("click", function() { lbNav(1); });
  lb.addEventListener("click", function(e) { if (e.target === lb) lbClose(); });

  document.addEventListener("keydown", function(e) {
    if (!lb.className) return;
    if (e.key === "Escape") lbClose();
    if (e.key === "ArrowLeft") lbNav(-1);
    if (e.key === "ArrowRight") lbNav(1);
  });
</script>

</body>
</html>
