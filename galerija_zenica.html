<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; font-family: sans-serif; }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px;
  }

  .grid img {
    width: 100%;
    height: auto;
    display: block;
    cursor: pointer;
    transition: opacity .2s;
  }
  .grid img:hover { opacity: .78; }
</style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
  var base = "https://asacentral.ba/media/Poslovnica_Zenica_jun_2026/";
  var slike = [
    "DSC_5611_web.webp",
    "DSC_5593_web.webp",
    "DSC_5707_web.webp",
    "DSC_5641_web.webp",
    "DSC_5670_web.webp",
    "DSC_5727.webp"
  ];

  slike.slice(0, 2).forEach(function(s, i) {
    var img = document.createElement("img");
    img.src = base + s;
    img.alt = "Poslovnica Zenica " + (i+1);
    img.addEventListener("click", function() {
      window.open(
        "https://mastonaut.github.io/galerija/lightbox.html?i=" + i,
        "_blank"
      );
    });
    document.getElementById("grid").appendChild(img);
  });
</script>
</body>
</html>
